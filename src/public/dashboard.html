<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job Queue Dashboard</title>
  <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
    header { background: #1e293b; padding: 20px 32px; border-bottom: 1px solid #334155; display: flex; align-items: center; justify-content: space-between; }
    header h1 { font-size: 1.4rem; font-weight: 700; color: #f8fafc; }
    .badge { background: #22c55e; color: #fff; font-size: 0.75rem; padding: 4px 10px; border-radius: 20px; font-weight: 600; }
    .badge.offline { background: #ef4444; }
    .container { max-width: 1200px; margin: 0 auto; padding: 32px; }
    .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 32px; }
    .stat { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 20px; }
    .stat-label { font-size: 0.8rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
    .stat-value { font-size: 2rem; font-weight: 700; }
    .stat-value.queued { color: #f59e0b; }
    .stat-value.active { color: #3b82f6; }
    .stat-value.completed { color: #22c55e; }
    .stat-value.failed { color: #ef4444; }
    .section-title { font-size: 1rem; font-weight: 600; color: #94a3b8; margin-bottom: 16px; text-transform: uppercase; letter-spacing: 0.05em; }
    .submit-bar { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 20px; margin-bottom: 32px; display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group label { font-size: 0.8rem; color: #94a3b8; }
    select, input { background: #0f172a; border: 1px solid #334155; color: #e2e8f0; padding: 8px 12px; border-radius: 8px; font-size: 0.9rem; outline: none; }
    select:focus, input:focus { border-color: #3b82f6; }
    button { background: #3b82f6; color: #fff; border: none; padding: 9px 20px; border-radius: 8px; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: background 0.2s; }
    button:hover { background: #2563eb; }
    button.danger { background: #ef4444; }
    button.danger:hover { background: #dc2626; }
    .jobs-list { display: flex; flex-direction: column; gap: 12px; }
    .job-card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 16px 20px; display: flex; align-items: center; gap: 16px; transition: border-color 0.3s; animation: slideIn 0.3s ease; }
    .job-card.active { border-color: #3b82f6; }
    .job-card.completed { border-color: #22c55e; }
    .job-card.failed { border-color: #ef4444; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    .job-icon { font-size: 1.5rem; width: 40px; text-align: center; }
    .job-info { flex: 1; }
    .job-id { font-size: 0.75rem; color: #64748b; font-family: monospace; margin-bottom: 4px; }
    .job-type { font-size: 0.9rem; font-weight: 600; color: #f8fafc; }
    .job-meta { font-size: 0.8rem; color: #94a3b8; margin-top: 2px; }
    .job-status { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
    .status-badge { font-size: 0.75rem; font-weight: 600; padding: 4px 10px; border-radius: 20px; }
    .status-badge.queued { background: #451a03; color: #f59e0b; }
    .status-badge.active { background: #1e3a5f; color: #3b82f6; }
    .status-badge.completed { background: #052e16; color: #22c55e; }
    .status-badge.failed { background: #2d0a0a; color: #ef4444; }
    .progress-bar { width: 120px; height: 4px; background: #334155; border-radius: 2px; overflow: hidden; }
    .progress-fill { height: 100%; background: #3b82f6; border-radius: 2px; transition: width 0.3s ease; }
    .duration { font-size: 0.75rem; color: #64748b; }
    .feed { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 16px; margin-top: 32px; max-height: 200px; overflow-y: auto; }
    .feed-item { font-size: 0.8rem; font-family: monospace; color: #94a3b8; padding: 4px 0; border-bottom: 1px solid #1e293b; }
    .feed-item span { color: #3b82f6; }
    .empty { text-align: center; color: #475569; padding: 40px; font-size: 0.9rem; }
  </style>
</head>
<body>
  <header>
    <h1>⚡ Job Queue Dashboard</h1>
    <span class="badge offline" id="conn-badge">Disconnected</span>
  </header>

  <div class="container">

    <!-- Stats -->
    <div class="stats">
      <div class="stat">
        <div class="stat-label">Queued</div>
        <div class="stat-value queued" id="stat-queued">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">Active</div>
        <div class="stat-value active" id="stat-active">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">Completed</div>
        <div class="stat-value completed" id="stat-completed">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">Failed</div>
        <div class="stat-value failed" id="stat-failed">0</div>
      </div>
    </div>

    <!-- Submit Bar -->
    <div class="submit-bar">
      <div class="form-group">
        <label>Job Type</label>
        <select id="job-type">
          <option value="email">Email</option>
          <option value="report">Report</option>
          <option value="notification">Notification</option>
        </select>
      </div>
      <div class="form-group">
        <label>Priority</label>
        <select id="job-priority">
          <option value="high">High</option>
          <option value="medium">Medium</option>
          <option value="low">Low</option>
        </select>
      </div>
      <button onclick="submitJob()">Submit Job</button>
      <button onclick="submitBatch()">Submit 5 Jobs</button>
      <button class="danger" onclick="clearCompleted()">Clear Completed</button>
    </div>

    <!-- Jobs List -->
    <div class="section-title">Live Jobs</div>
    <div class="jobs-list" id="jobs-list">
      <div class="empty" id="empty-state">No jobs yet — submit one above!</div>
    </div>

    <!-- Event Feed -->
    <div class="section-title" style="margin-top: 32px;">Event Feed</div>
    <div class="feed" id="feed"></div>

  </div>

  <script>
    const socket = io('http://localhost:3000', {
      auth: { apiKey: 'default-dev-key' }
    });
    const jobs = {};
    const stats = { queued: 0, active: 0, completed: 0, failed: 0 };

    const jobIcons = { email: '📧', report: '📊', notification: '🔔' };

    // Connection
    socket.on('connect', () => {
      document.getElementById('conn-badge').textContent = 'Connected';
      document.getElementById('conn-badge').classList.remove('offline');
      addFeedItem('system', 'Connected to server');
    });

    socket.on('disconnect', () => {
      document.getElementById('conn-badge').textContent = 'Disconnected';
      document.getElementById('conn-badge').classList.add('offline');
      addFeedItem('system', 'Disconnected from server');
    });

    // Real-time job updates
    socket.on('job:feed', (event) => {
      updateJob(event);
      addFeedItem(event.type, `${event.event} — ${event.jobId.slice(0, 8)}...`);
    });

    function updateJob(event) {
      const { jobId, type, status, progress } = event;

      if (!jobs[jobId]) {
        jobs[jobId] = { jobId, type, status, progress: 0, createdAt: new Date() };
        document.getElementById('empty-state')?.remove();
      }

      // Update stats
      const prev = jobs[jobId].status;
      if (prev && prev !== status) {
        if (stats[prev] > 0) stats[prev]--;
        stats[status] = (stats[status] || 0) + 1;
      } else if (!prev) {
        stats[status] = (stats[status] || 0) + 1;
      }

      jobs[jobId].status = status;
      if (progress !== undefined) jobs[jobId].progress = progress;

      renderStats();
      renderJob(jobId);
    }

    function renderStats() {
      ['queued', 'active', 'completed', 'failed'].forEach(s => {
        document.getElementById(`stat-${s}`).textContent = stats[s] || 0;
      });
    }

    function renderJob(jobId) {
      const job = jobs[jobId];
      const icon = jobIcons[job.type] || '⚙️';
      const existing = document.getElementById(`job-${jobId}`);

      const html = `
        <div class="job-card ${job.status}" id="job-${jobId}">
          <div class="job-icon">${icon}</div>
          <div class="job-info">
            <div class="job-id">${jobId}</div>
            <div class="job-type">${job.type.charAt(0).toUpperCase() + job.type.slice(1)} Job</div>
            <div class="job-meta">${new Date(job.createdAt).toLocaleTimeString()}</div>
          </div>
          <div class="job-status">
            <span class="status-badge ${job.status}">${job.status}</span>
            ${job.status === 'active' ? `
              <div class="progress-bar">
                <div class="progress-fill" style="width: ${job.progress || 0}%"></div>
              </div>
            ` : ''}
          </div>
        </div>
      `;

      if (existing) {
        existing.outerHTML = html;
      } else {
        document.getElementById('jobs-list').insertAdjacentHTML('afterbegin', html);
      }
    }

    function addFeedItem(type, message) {
      const feed = document.getElementById('feed');
      const time = new Date().toLocaleTimeString();
      feed.insertAdjacentHTML('afterbegin', `
        <div class="feed-item"><span>[${time}]</span> ${type}: ${message}</div>
      `);
    }

    async function submitJob() {
      const type = document.getElementById('job-type').value;
      const priority = document.getElementById('job-priority').value;

      const dataMap = {
        email: { to: 'user@example.com', subject: 'Hello!', body: 'Test email' },
        report: { reportType: 'monthly', filters: {}, outputFormat: 'pdf', requestedBy: 'admin@example.com' },
        notification: { userId: 'user-123', message: 'Hello!', channel: 'push' },
      };

      const res = await fetch('http://localhost:3000/jobs', {
        method: 'POST',
        headers: { 
          'Content-Type': 'application/json',
          'x-api-key': 'default-dev-key'
        },
        body: JSON.stringify({ type, priority, data: dataMap[type] }),
      });

      const job = await res.json();
      jobs[job.jobId] = { jobId: job.jobId, type, status: 'queued', progress: 0, createdAt: new Date() };
      stats.queued = (stats.queued || 0) + 1;
      renderStats();
      renderJob(job.jobId);
      addFeedItem(type, `Submitted job ${job.jobId.slice(0, 8)}...`);
    }

    async function submitBatch() {
      for (let i = 0; i < 5; i++) {
        const types = ['email', 'report', 'notification'];
        const priorities = ['high', 'medium', 'low'];
        document.getElementById('job-type').value = types[i % 3];
        document.getElementById('job-priority').value = priorities[i % 3];
        await submitJob();
        await new Promise(r => setTimeout(r, 200));
      }
    }

    function clearCompleted() {
      Object.keys(jobs).forEach(id => {
        if (jobs[id].status === 'completed') {
          document.getElementById(`job-${id}`)?.remove();
          if (stats.completed > 0) stats.completed--;
          delete jobs[id];
        }
      });
      renderStats();
      if (Object.keys(jobs).length === 0) {
        document.getElementById('jobs-list').innerHTML =
          '<div class="empty" id="empty-state">No jobs yet — submit one above!</div>';
      }
    }

    // Load existing jobs on page load
    fetch('http://localhost:3000/jobs', {
      headers: { 'x-api-key': 'default-dev-key' }
    })
      .then(r => r.json())
      .then(data => {
        data.data.slice(0, 20).reverse().forEach(job => {
          jobs[job.id] = { jobId: job.id, type: job.type, status: job.status, progress: 0, createdAt: job.created_at };
          stats[job.status] = (stats[job.status] || 0) + 1;
          document.getElementById('empty-state')?.remove();
          renderJob(job.id);
        });
        renderStats();
      });
  </script>
</body>
</html>
